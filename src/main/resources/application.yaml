spring:
  application:
    name: oauth.service
  cache:
    type: redis

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: ${spring.application.name}
      data-source-properties:
        ApplicationName: ${spring.application.name}
      maximum-pool-size: ${DB_MAX_POOL_SIZE}        # Rise from default 10
      minimum-idle: ${DB_MAX_MINIMUM_IDLE}
      connection-timeout: ${DB_CONNECTION_TIMEOUT}    # keep or raise slightly (ms)
      idle-timeout: ${DB_IDLE_TIMEOUT}         # 10 min
      max-lifetime: ${DB_MAX_LIFE_TIME}        # 30 min
      leak-detection-threshold: ${DB_DETECTION_THRESHOLD}  # The 20s, for debugging only
      validation-timeout: ${DB_VALIDATION_TIMEOUT}
      initialization-fail-timeout: ${DB_INITIALIZATION_FAIL_TIMEOUT}
server:
  port: ${OAUTH_SERVICE_PORT:8083}